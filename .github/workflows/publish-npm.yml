name: Publish to npm

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: Publish @pier/extension to npm
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@pier/extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        working-directory: packages/pier-extension
        run: npm run build

      - name: Publish to npm
        working-directory: packages/pier-extension
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
