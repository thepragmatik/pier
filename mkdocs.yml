site_name: Pier
site_description: Pi ↔ Hermes orchestrator integration
site_author: The Pragmatik
repo_url: https://github.com/thepragmatik/pier
repo_name: thepragmatik/pier
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.indexes
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
      - Getting Started: user-guide/getting-started.md
      - Installation: user-guide/install.md
      - Skills: user-guide/skills.md
      - Plugins: user-guide/plugins.md
      - Pi Extensions: user-guide/pi-extensions.md
      - Pi Extension Setup: user-guide/pi-extension-setup.md
  - Architecture:
      - Overview: architecture/overview.md
      - Integration Spec: architecture/pier-integration-spec.md
      - ADR 1 - Integration Approach: architecture/adr-001-integration-approach.md
      - ADR 2 - Communication Protocol: architecture/adr-002-communication-protocol.md
      - ADR 3 - Dogfooding Strategy: architecture/adr-003-dogfooding-strategy.md
  - Reference:
      - Pi Extension Ecosystem Guide: reference/pi-ecosystem-guide.md
  - Research:
      - Pi Architecture: research/pi-architecture-deep-dive.md
      - Hermes Coding Patterns: research/hermes-coding-agent-patterns.md
      - Integration Landscape: research/competitive-integration-landscape.md
